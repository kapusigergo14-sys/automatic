name: Send follow-up (3-step sequence)

on:
  workflow_dispatch:
    inputs:
      day:
        description: 'Days since original. 3 = bump, 7 = breakup'
        type: choice
        options:
          - '3'
          - '7'
        default: '3'
      limit:
        description: 'Max emails to send'
        type: string
        default: '50'
      spread_minutes:
        description: 'Spread window in minutes (0 = immediate)'
        type: string
        default: '0'
      dry_run:
        description: 'Dry run (no emails sent)'
        type: boolean
        default: false

concurrency:
  group: send-followup
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'smartflowdev-bot'
          git config user.email 'bot@smartflowdev.com'
          git config --global push.default current

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send follow-up batch
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          DAY="${{ github.event.inputs.day || '3' }}"
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          SPREAD="${{ github.event.inputs.spread_minutes || '0' }}"
          DRY="${{ github.event.inputs.dry_run }}"
          DRY_FLAG=""
          if [ "$DRY" = "true" ]; then DRY_FLAG="--dry-run"; fi
          npx ts-node scripts/send-followup.ts \
            --day "$DAY" \
            --limit "$LIMIT" \
            --spread-minutes "$SPREAD" \
            $DRY_FLAG

      - name: Final state push
        if: always()
        run: |
          git add output/v5-campaign/send-state-*.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(followup): state sync [skip ci]"
            git push origin HEAD
          fi

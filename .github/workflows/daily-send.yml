name: Daily v5 dental send

on:
  schedule:
    # 17:00 UTC = 13:00 EDT (summer) / 12:00 EST (winter)
    # = 19:00 CEST / 18:00 CET — middle of US Eastern 12:00-16:00 window
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      markets:
        description: 'Markets — comma-separated. Available: US | UK | AU (OSM-supported). Examples: US  /  US,UK  /  US,UK,AU'
        type: string
        default: 'US,UK,AU'
      dry_run:
        description: 'Dry run (no emails sent)'
        type: boolean
        default: false
      limit:
        description: 'Max emails to send'
        type: string
        default: '30'
      spread_minutes:
        description: 'Spread window in minutes'
        type: string
        default: '240'

concurrency:
  group: daily-send-v5
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'smartflowdev-bot'
          git config user.email 'bot@smartflowdev.com'
          git config --global push.default current

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect new leads via OSM (zero-cost)
        run: |
          MARKETS_INPUT="${{ github.event.inputs.markets || 'US,UK,AU' }}"
          # OSM collector only supports US/UK/AU — filter out any other codes gracefully
          MARKETS=$(echo "$MARKETS_INPUT" | tr ',' '\n' | tr -d ' ' | grep -E '^(US|UK|AU)$' | paste -sd, || echo '')
          if [ -z "$MARKETS" ]; then
            echo "ℹ️  No OSM-supported markets in input ($MARKETS_INPUT). Skipping collect step."
          else
            echo "🦷 Running OSM collect for: $MARKETS"
            npx ts-node scripts/osm-collect.ts \
              --markets "$MARKETS" \
              --limit 150 \
              --regions-per-market 3 \
              --concurrency 10 \
              --min-cooldown-days 7 || echo "⚠️  OSM collect step errored — continuing to send step with existing pool."
          fi

      - name: Commit collected leads
        run: |
          git add output/leads/dental-v5-modern.json output/v5-campaign/osm-region-progress.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(osm): collect leads [skip ci]"
            git push origin HEAD
          else
            echo "No new leads to commit"
          fi

      - name: Send daily batch (spread + per-send commit)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          MARKETS="${{ github.event.inputs.markets || 'US,UK,AU' }}"
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          SPREAD="${{ github.event.inputs.spread_minutes || '240' }}"
          DRY="${{ github.event.inputs.dry_run }}"
          DRY_FLAG=""
          if [ "$DRY" = "true" ]; then DRY_FLAG="--dry-run"; fi
          npx ts-node scripts/send-dental-v5.ts \
            --markets "$MARKETS" \
            --limit "$LIMIT" \
            --spread-minutes "$SPREAD" \
            --git-commit-per-send \
            $DRY_FLAG

      - name: Final state push (safety net)
        if: always()
        run: |
          git add output/v5-campaign/send-state-v5.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(v5): final state sync [skip ci]"
            git push origin HEAD
          else
            echo "State already in sync"
          fi

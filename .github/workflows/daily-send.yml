name: Daily v5 dental send

on:
  schedule:
    # 17:00 UTC = 13:00 EDT (summer) / 12:00 EST (winter)
    # = 19:00 CEST / 18:00 CET — middle of US Eastern 12:00-16:00 window
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      markets:
        description: 'Markets — comma-separated (e.g. US,UK,HU). Blank = all English markets.'
        type: string
        default: 'US,UK,CA,AU,NZ,IE'
      dry_run:
        description: 'Dry run (no emails sent)'
        type: boolean
        default: false
      limit:
        description: 'Max emails to send'
        type: string
        default: '30'
      spread_minutes:
        description: 'Spread window in minutes'
        type: string
        default: '240'

concurrency:
  group: daily-send-v5
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'smartflowdev-bot'
          git config user.email 'bot@smartflowdev.com'
          git config --global push.default current

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Collect new leads (parallel fetch, chatbot filter)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MARKETS="${{ github.event.inputs.markets || 'US,UK,CA,AU,NZ,IE' }}"
          npx ts-node scripts/auto-dental-v5-collect.ts --markets "$MARKETS" --limit 300 --concurrency 10

      - name: Commit collected leads
        run: |
          git add output/leads/dental-v5-modern.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(v5): collect leads [skip ci]"
            git push origin HEAD
          else
            echo "No new leads to commit"
          fi

      - name: Send daily batch (spread + per-send commit)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          MARKETS="${{ github.event.inputs.markets || 'US,UK,CA,AU,NZ,IE' }}"
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          SPREAD="${{ github.event.inputs.spread_minutes || '240' }}"
          DRY="${{ github.event.inputs.dry_run }}"
          DRY_FLAG=""
          if [ "$DRY" = "true" ]; then DRY_FLAG="--dry-run"; fi
          npx ts-node scripts/send-dental-v5.ts \
            --markets "$MARKETS" \
            --limit "$LIMIT" \
            --spread-minutes "$SPREAD" \
            --git-commit-per-send \
            $DRY_FLAG

      - name: Final state push (safety net)
        if: always()
        run: |
          git add output/v5-campaign/send-state-v5.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(v5): final state sync [skip ci]"
            git push origin HEAD
          else
            echo "State already in sync"
          fi

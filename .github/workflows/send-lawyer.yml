name: Send lawyer chatbot pitch

on:
  workflow_dispatch:
    inputs:
      markets:
        description: 'Markets — comma-separated. US | UK | AU'
        type: string
        default: 'US,UK,AU'
      limit:
        description: 'Max emails to send'
        type: string
        default: '40'
      spread_minutes:
        description: 'Spread window in minutes (0 = immediate)'
        type: string
        default: '0'
      dry_run:
        description: 'Dry run (no emails sent)'
        type: boolean
        default: false

concurrency:
  group: send-lawyer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send-lawyer:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'smartflowdev-bot'
          git config user.email 'bot@smartflowdev.com'
          git config --global push.default current

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send lawyer batch
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          MARKETS="${{ github.event.inputs.markets || 'US,UK,AU' }}"
          LIMIT="${{ github.event.inputs.limit || '40' }}"
          SPREAD="${{ github.event.inputs.spread_minutes || '0' }}"
          DRY="${{ github.event.inputs.dry_run }}"
          DRY_FLAG=""
          if [ "$DRY" = "true" ]; then DRY_FLAG="--dry-run"; fi
          npx ts-node scripts/send-lawyer.ts \
            --markets "$MARKETS" \
            --limit "$LIMIT" \
            --spread-minutes "$SPREAD" \
            --git-commit-per-send \
            $DRY_FLAG

      - name: Final state push
        if: always()
        run: |
          git add output/v5-campaign/send-state-lawyer.json output/leads/lawyer-modern.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(lawyer): state sync [skip ci]"
            git push origin HEAD
          fi
